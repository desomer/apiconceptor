# R010_mask_pii.yaml
id: R010
name: mask_pii
category: security
description: Masque ou redige des données sensibles selon politique
scope: field
inputs:
  - path: field
    type: string
params:
  - name: mask_type
    type: string
    enum: [partial, full, hash, token]
    default: partial
  - name: visible_prefix
    type: integer
    default: 1
  - name: visible_suffix
    type: integer
    default: 1
  - name: hash_algo
    type: string
    default: sha256
example:
  input: { "ssn": "123-45-6789" }
  output: { "ssn": "1*******9" }
tests:
  - id: T_R010_01
    type: unit
    input: { "ssn": "123456789" }
    expected: { "ssn": "1*******9" }
severity: high
action_on_error: dlq
complexity: medium
implementation_notes: "Conserver mapping tokenisation dans KMS/secure store"